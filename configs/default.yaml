# ABSTRAL Default Configuration
# Generated by: abstral init

meta_agent:
  model: "claude-sonnet-4-20250514"
  provider: "anthropic"
  max_tokens: 8192

agent_backbone:
  model: "gpt-4o-mini"
  provider: "openai"
  max_tokens: 50000  # 50K token budget per run

benchmarks:
  - name: "alfworld"
    metric: "task_completion_rate"
    val_instances: 500
    test_instances: null  # full test split
  - name: "webarena"
    metric: "task_success_rate"
    val_instances: 500
    test_instances: null
  - name: "gaia"
    metric: "accuracy"
    val_instances: 500
    test_instances: null
  - name: "tabular"
    metric: "auroc"
    val_instances: 500
    test_instances: null

inner_loop:
  max_iterations: 15
  val_batch_size: 50
  convergence_batch_size: 500
  token_budget: 50000
  wall_clock_limit_sec: 300  # 5 minutes
  sandbox:
    memory_mb: 2048
    cpus: 2

convergence:
  skill_diff_threshold: 5      # C1: diff lines < 5
  auc_plateau_epsilon: 0.005   # C2: |AUC_t - AUC_{t-1}| < 0.005
  auc_plateau_window: 3        # C2: consecutive iters
  ec_collapse_threshold: 0.10  # C3: EC1+EC2 fraction < 10%
  max_rules: 200               # C4: complexity penalty trigger
  max_words: 5000              # C4: complexity penalty trigger
  min_weight_to_terminate: 3   # total weight >= 3 across C1-C4

outer_loop:
  n_outer: 6
  min_ged: 3  # minimum graph edit distance from prior topologies
  topology_families:
    - "single"
    - "pipeline"
    - "ensemble"
    - "debate"
    - "hierarchical"
    - "dynamic_routing"

tracking:
  mlflow_tracking_uri: "mlruns"
  otel_service_name: "abstral"
  experiment_name: "abstral-main"

paths:
  skill_repo: "skill_repo"
  artifacts: "artifacts"
  logs: "logs"
